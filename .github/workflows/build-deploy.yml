name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BRIDGETOWN_ENV: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (with GitHub Actions as the source) on first run,
          # so no manual Settings -> Pages toggle is required.
          enablement: true

      # `rake` (default task) runs clean -> frontend:build (esbuild) -> bridgetown build
      - name: Build site
        run: bundle exec rake

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
